<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip Factory</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="hud">
        <div class="stat-item">
            <span class="stat-icon">💰</span>
            <span id="money">0</span>
        </div>
        
        <div class="stat-item">
            <span id="level-tag">LVL <span id="level">1</span></span>
            <div class="xp-group">
                <div class="xp-bar-bg"><div id="xp-bar-fill"></div></div>
                <span style="font-size: 10px; color: #94a3b8; text-align: center; font-weight: 500; letter-spacing: 0.5px;">
                    <span id="xp">0</span> / <span id="xp-target">0</span> <span style="opacity: 0.6">XP</span>
                </span>
                <div id="prestige-boost-info" style="font-size: 9px; color: #ff00ff; text-align: center; font-weight: 900; margin-top: 3px; letter-spacing: 0.5px; text-shadow: 0 0 5px rgba(255,0,255,0.3); display: none;">
                    +<span id="prestige-boost-val">0</span>% XP, CASH & DATA
                </div>
            </div>
        </div>

        <div class="stat-item">
            <span class="stat-icon">📦</span>
            <span id="data-count">0</span>
        </div>
    </div>

    <div id="main-container">
        <div id="shop">
            <div id="shop-items-container"></div>
        </div>

        <div id="workspace">
            <div id="viewport">
                <svg id="connections-layer"></svg>
                <div id="grid"></div>
            </div>
        </div>
    </div>

    <div id="utility-bar">
        <div class="tool-item" id="btn-pan" title="Move Workspace" onclick="selectTool('pan')">🖐️</div>
        <div class="tool-item" id="btn-link" title="Link Chips" onclick="selectTool('link')">🔗</div>
        <div class="tool-item" id="btn-move" title="Move Chip" onclick="selectTool('move')">🏗️</div>
        <div class="tool-item" title="Zoom In" onclick="changeZoom(0.1)">➕</div>
        <div class="tool-item" title="Zoom Out" onclick="changeZoom(-0.1)">➖</div>
    </div>

    <button id="btn-achievements" onclick="toggleAchievementMenu()" title="Achievements" style="position: fixed; top: 20px; right: 20px; z-index: 3000; padding: 10px; background: #222; border: 1px solid #444; border-radius: 50%; cursor: pointer; font-size: 1.2em;">🏆</button>
    <button id="btn-prestige" onclick="togglePrestigeMenu()" title="Prestige System" style="position: fixed; top: 75px; right: 20px; z-index: 3000; padding: 10px; background: #222; border: 1px solid #ff00ff; border-radius: 50%; cursor: pointer; font-size: 1.2em; box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);">⚛️</button>
    <button id="btn-lab" onclick="toggleLaboratoryMenu()" title="Research Lab" style="position: fixed; top: 130px; right: 20px; z-index: 3000; padding: 10px; background: #222; border: 1px solid #00d4ff; border-radius: 50%; cursor: pointer; font-size: 1.2em; box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); display: none;">🧪</button>

    <div id="context-menu" class="context-menu">
        <div class="context-menu-item" id="menu-move">🏗️ Move Chip</div>
        <div class="context-menu-item delete" id="menu-delete">🗑️ Delete</div>
    </div>
    
    <script src="js/version.js"></script>
    <script src="js/state.js"></script>
    <script src="js/tutorial.js"></script>
    <script src="js/laboratory.js"></script>
    <script src="js/prestige.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/connections.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/chips.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/helper.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
